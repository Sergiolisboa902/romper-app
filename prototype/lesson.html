<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romper - Lição</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Lesson Header -->
        <header class="lesson-header">
            <button class="close-btn" onclick="window.location.href='index.html'">✕</button>
            <div class="progress-bar-container">
                <div class="progress-bar-fill"></div>
            </div>
            <div class="stat-item hearts">
                <span>❤️</span>
                <span class="stat-value">5</span>
            </div>
        </header>

        <main class="exercise-container" id="exercise-render">
            <div class="exercise-type">CARREGANDO...</div>
            <h1 class="question">Carregando pergunta...</h1>

            <div class="options-list">
                <!-- Conteúdo renderizado pelo JS -->
            </div>

            <!-- Feedback Area -->
            <div class="feedback-container">
                <div class="feedback-header">
                    <span>✅</span>
                    <span>Feedback</span>
                </div>
                <p class="feedback-text"></p>
            </div>
        </main>

        <footer class="continue-container">
            <button class="btn-primary" id="btn-next">CONTINUAR</button>
        </footer>
    </div>
    <script type="module" src="js/lesson-loader.js"></script>
</body>
</html>
