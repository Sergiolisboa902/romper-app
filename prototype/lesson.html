<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romper - Lição</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Lesson Header -->
        <header class="lesson-header">
            <button class="close-btn" onclick="window.location.href='index.html'">✕</button>
            <div class="progress-bar-container">
                <div class="progress-bar-fill"></div>
            </div>
            <div class="stat-item hearts">
                <span>❤️</span>
                <span class="stat-value">5</span>
            </div>
        </header>

        <main class="exercise-container">
            <div class="exercise-type">MÚLTIPLA ESCOLHA</div>
            <h1 class="question">Quem foi o primeiro rei de Israel?</h1>

            <!-- Ícone central opcional -->
            <div style="display:flex;justify-content:center;padding:20px 0;">
                <div style="width:100px;height:100px;background:var(--unit-bg);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:50px;">
                    👑
                </div>
            </div>

            <div class="options-list">
                <div class="option-card" data-answer="wrong">
                    <div class="option-badge">A</div>
                    <span class="option-text">Davi</span>
                </div>

                <div class="option-card" data-answer="correct">
                    <div class="option-badge">B</div>
                    <span class="option-text">Saul</span>
                </div>

                <div class="option-card" data-answer="wrong">
                    <div class="option-badge">C</div>
                    <span class="option-text">Salomão</span>
                </div>

                <div class="option-card" data-answer="wrong">
                    <div class="option-badge">D</div>
                    <span class="option-text">Moisés</span>
                </div>
            </div>

            <!-- Feedback Area -->
            <div class="feedback-container">
                <div class="feedback-header">
                    <span>✅</span>
                    <span>Correto!</span>
                </div>
                <p class="feedback-text">Feedback detalhado aparecerá aqui.</p>
            </div>
        </main>

        <footer class="continue-container">
            <button class="btn-primary">CONTINUAR</button>
        </footer>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
